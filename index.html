<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Absen Karyawan</title>

<style>
  :root {
    --bg:            #f7f6f3;
    --white:         #ffffff;
    --border:        #e8e4dc;
    --text:          #1a1a18;
    --muted:         #888880;
    --accent:        #2563eb;
    --accent-light:  #eff6ff;
    --success:       #16a34a;
    --success-light: #f0fdf4;
    --danger:        #dc2626;
    --danger-light:  #fef2f2;
    --warn:          #d97706;
    --warn-light:    #fffbeb;
    --shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:     0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── Title ── */
  .title-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-bottom: 20px;
    padding-top: 24px;
  }
  .title-main { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
  .title-sub  { font-size: 18px; color: var(--muted); margin-top: 2px; }
  .header-time {
    font-size: 16px;
    font-weight: 600;
    margin-top: 2px;
    color: var(--accent);
  }

  /* ── Container ── */
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

  /* ── Date bar ── */
  .date-bar {
    background: var(--accent);
    color: white;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .date-bar .day       { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
  .date-bar .date-full { font-size: 12px; opacity: .8; margin-top: 2px; }
  .date-bar .jam-besar {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 12px;
  }

  /* ── Input ── */
  .input-group  { margin-bottom: 10px; }
  .input-label  { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; display: block; }
  .input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }
  .input:focus       { border-color: var(--accent); }
  .input::placeholder { color: #c8c6c0; }

  /* ── Tipe toggle ── */
  .tipe-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 4px;
  }
  .tipe-btn {
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    color: var(--muted);
  }
  .tipe-btn.selected {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Kamera ── */
  .camera-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #f0ede8;
    aspect-ratio: 3/4;
    cursor: pointer;
    border: 2px dashed var(--border);
    transition: border-color .2s;
  }
  .camera-wrap.active { border-style: solid; border-color: var(--accent); }
  .camera-wrap video,
  .camera-wrap img    { width: 100%; height: 100%; object-fit: cover; display: block; }

  .cam-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
  }
  .cam-icon          { font-size: 40px; }
  .cam-placeholder p { font-size: 14px; font-weight: 500; }
  .cam-placeholder span { font-size: 12px; color: #aaa; }

  .cam-gradient {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(0,0,0,.5), transparent);
    pointer-events: none;
    display: none;
  }
  .cam-gradient.show { display: block; }

  .shutter-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 60px;
    background: white;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.6);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 10px rgba(0,0,0,.3);
    transition: transform .1s;
    z-index: 5;
  }
  .shutter-btn:active { transform: translateX(-50%) scale(.92); }

  .retake-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,.5);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    display: none;
    z-index: 5;
  }

  /* ── GPS ── */
  .gps-row { display: flex; align-items: center; gap: 10px; }
  .gps-status {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 13px;
    background: var(--bg);
  }
  .gps-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .gps-dot.ok      { background: var(--success); }
  .gps-dot.loading { background: var(--warn); animation: pulse 1s infinite; }
  .gps-dot.err     { background: var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .gps-text   { color: var(--muted); font-size: 13px; }
  .gps-coords { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .btn-gps {
    padding: 11px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--accent);
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-gps:active { background: var(--accent-light); }

  .radius-badge {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 6px;
  }

  .radius-badge.out { background: var(--warn-light);    color: var(--warn);    display: flex; }

  /* ── Submit button ── */
  .btn-absen {
    width: 100%;
    padding: 17px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;

  .detail-box { background: var(--bg); border-radius: 12px; padding: 16px; text-align: left; margin-bottom: 20px; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--muted); }
  .detail-val { font-weight: 600; }

  .btn-lagi {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a18;
    color: white;
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show    { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); }
  .toast.error   { background: var(--danger); }
  .toast.warn    { background: var(--warn); }

  canvas { display: none; }
</style>

<script>
// =============================================

const SUPABASE_URL = 'https://szjlxhfawjopjyfacwxe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6amx4aGZhd2pvcGp5ZmFjd3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODU1MDksImV4cCI6MjA5MTk2MTUwOX0.-x6FGoEId7d6PwGRKTHYgs92bkrSpddX15vQlhMVazc';

const CLOUDINARY_CLOUD_NAME    = '';
const CLOUDINARY_UPLOAD_PRESET = '';

// Koordinat kantor default (fallback jika tidak ada assign lokasi)
const KANTOR_LAT    = -8.621840340445894;

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ──
let tipeAbsen  = 'masuk';

let gpsData     = null;

// =============================================
// INISIALISASI

document.addEventListener('DOMContentLoaded', () => {
  updateJam();

function updateJam() {
  const now = new Date();
  document.getElementById('header-clock').textContent = now.toLocaleTimeString('id-ID');
  document.getElementById('jam-besar').textContent    = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('hari-ini').textContent     = now.toLocaleDateString('id-ID', { weekday: 'long' });

// =============================================

function pilihTipe(tipe) {
  tipeAbsen = tipe;

  document.getElementById('btn-pulang').classList.toggle('selected', tipe === 'pulang');

// =============================================
// KAMERA
// =============================================
function handleCameraClick() {
  if (kameraAktif || fotoDataURL) return;
  bukaKamera();
}

async function bukaKamera() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 960 } },
      audio: false
    });

    const video = document.getElementById('video-el');
    video.srcObject = videoStream;
    video.style.display = 'block';

    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('cam-gradient').classList.add('show');
    document.getElementById('shutter-btn').style.display = 'flex';
    document.getElementById('camera-wrap').classList.add('active');
    kameraAktif = true;
  } catch {
    toast('Kamera tidak bisa dibuka. Izinkan akses kamera di browser.', 'error');
  }
}

function ambilFoto(e) {
  e.stopPropagation();

  const video  = document.getElementById('video-el');
  const canvas = document.getElementById('foto-canvas');
  canvas.width  = video.videoWidth  || 480;
  canvas.height = video.videoHeight || 640;
  canvas.getContext('2d').drawImage(video, 0, 0);
  fotoDataURL = canvas.toDataURL('image/jpeg', 0.75);

  document.getElementById('foto-preview').src          = fotoDataURL;
  document.getElementById('foto-preview').style.display = 'block';
  video.style.display                                   = 'none';
  document.getElementById('shutter-btn').style.display = 'none';
  document.getElementById('retake-btn').style.display  = 'block';

  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  kameraAktif = false;
  toast('Foto berhasil diambil ✓', 'success');
}

function ulangiKamera(e) {
  e.stopPropagation();
  fotoDataURL = null;
  document.getElementById('foto-preview').style.display = 'none';
  document.getElementById('retake-btn').style.display   = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('cam-gradient').classList.remove('show');
  document.getElementById('camera-wrap').classList.remove('active');
  bukaKamera();
}

// =============================================
// GPS
// =============================================
function hitungJarak(lat1, lon1, lat2, lon2) {
  const R    = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a    = Math.sin(dLat / 2) ** 2
             + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
             * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getLokasiTerdekat(userLat, userLng, listLokasi) {
  if (!listLokasi?.length) return { lokasi: null, jarak: 0, dalamRadius: false };

  let minJarak = Infinity;
  let lokasiTerpilih = null;

  for (const loc of listLokasi) {
    const jarak = hitungJarak(userLat, userLng, loc.lat, loc.lng);
    if (jarak < minJarak) { minJarak = jarak; lokasiTerpilih = loc; }
  }

  return {
    lokasi:      lokasiTerpilih,
    jarak:       Math.round(minJarak),
    dalamRadius: lokasiTerpilih ? minJarak <= (lokasiTerpilih.radius || 100) : false
  };
}

function deteksiGPS() {
  if (!lokasiKerja?.lat) { toast('Pilih lokasi dulu', 'warn'); return; }
  if (!document.getElementById('input-id').value.trim()) {
    toast('Isi ID karyawan dulu sebelum deteksi GPS', 'warn');
    return;
  }

  const dot = document.getElementById('gps-dot');
  const txt = document.getElementById('gps-text');
  dot.className   = 'gps-dot loading';
  txt.textContent = 'Mendeteksi...';

  if (!navigator.geolocation) {
    dot.className   = 'gps-dot err';
    txt.textContent = 'GPS tidak didukung';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;

      if (acc > 1000)                                { toast('GPS belum akurat, tunggu sebentar lalu coba lagi', 'warn');  return; }
      if (Math.abs(lat) > 90 || Math.abs(lng) > 180
          || (lat === 0 && lng === 0))               { toast('Koordinat GPS tidak valid, coba lagi', 'error'); return; }

      gpsData = { lat, lng, acc: Math.round(acc), time: Date.now() };

      document.getElementById('gps-dot').className   = 'gps-dot ok';
      document.getElementById('gps-text').textContent = 'Lokasi terdeteksi';

      const coords = document.getElementById('gps-coords');
      coords.textContent    = `${lat.toFixed(6)}, ${lng.toFixed(6)} (akurasi ±${Math.round(acc)}m)`;
      coords.style.display  = 'block';

      const jarakM  = hitungJarak(lat, lng, lokasiKerja.lat, lokasiKerja.lng);
      const jarakRound = Math.round(jarakM);
      const jarakTxt   = jarakM < 1000 ? `${jarakRound} m` : `${(jarakM / 1000).toFixed(2)} km`;
      const badge   = document.getElementById('radius-badge');

      if (jarakRound <= lokasiKerja.radius) {
        badge.className = 'radius-badge ok';
        badge.innerHTML = `✅ Di area kantor (${jarakTxt} dari kantor)`;
      } else {
        badge.className = 'radius-badge out';
        badge.innerHTML = `⚠️ Di luar area kantor (${jarakTxt} dari kantor)`;
      }

      toast('Lokasi berhasil dideteksi ✓', 'success');
    },
    () => {
      document.getElementById('gps-dot').className    = 'gps-dot err';
      document.getElementById('gps-text').textContent = 'Gagal deteksi GPS';
      toast('GPS gagal diakses', 'error');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

async function loadKaryawanList() {
  const { data, error } = await db
    .from('karyawan')
    .select('id_karyawan, nama')
    .eq('status', 'aktif')
    .order('nama');

  if (error) { console.error(error); return; }

  const select = document.getElementById('input-nama');
  select.innerHTML = '<option value="">-- Pilih Nama --</option>';
  data.forEach(k => {
    select.innerHTML += `<option value="${k.id_karyawan}">${k.nama}</option>`;
  });
}

function autoFillId() {
  const select = document.getElementById('input-nama');
  const id     = select.value;
  document.getElementById('input-id').value = id || '';
  if (id) loadLokasiByKaryawan(id);
}

async function loadLokasiByKaryawan(idKaryawan) {
  const { data, error } = await db
    .from('assign_lokasi')
    .select('lokasi:lokasi (id, nama, lat, lng, radius)')
    .eq('id_karyawan', idKaryawan);

  if (error) { toast('Gagal load lokasi', 'error'); return; }

  const select = document.getElementById('input-lokasi');
  select.innerHTML = '<option value="">-- Pilih Lokasi --</option>';
  data.forEach(row => {
    const loc = row.lokasi;
    select.innerHTML += `<option value='${JSON.stringify(loc)}'>${loc.nama}</option>`;
  });
  lokasiKerja = null;
}

async function loadAllLokasi() {
  const { data, error } = await db.from('lokasi').select('*');
  if (error) { console.error('Gagal load lokasi:', error); return; }
  allLokasi = data;
}

// =============================================
// SHIFT & EVALUASI ABSENSI
// =============================================
async function getShiftDetail(idKaryawan) {
  const hari = new Date().getDay();
  const { data } = await db
    .from('karyawan_shift')
    .select('shift:shift_id (id, nama_shift, toleransi_telat, shift_detail (*))')
    .eq('id_karyawan', idKaryawan)
    .single();

  if (!data) return null;
  return { ...data.shift, detail: data.shift.shift_detail.find(d => d.hari === hari) };
}

async function evaluasiAbsensi(idKaryawan, tipe) {
  const shift = await getShiftDetail(idKaryawan);
  if (!shift?.detail) return null;

  const toDate = (jam) => {
    const [h, m] = jam.split(':');
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d;
  };

  const now    = new Date();
  const masuk  = toDate(shift.detail.jam_masuk);
  const pulang = toDate(shift.detail.jam_pulang);

  const telat  = tipe === 'masuk'   ? Math.max(0, (now - masuk)  / 60000 - shift.toleransi_telat) : 0;
  const lembur = tipe === 'pulang'  ? Math.max(0, (now - pulang) / 60000) : 0;

  return { telat: Math.round(telat), lembur: Math.round(lembur), is_libur: shift.detail.is_libur };
}

// =============================================
// CEK STATUS KARYAWAN
// =============================================
async function cekKaryawanDanLokasi(idKaryawan) {
  try {
    const { data: karyData } = await db.from('karyawan').select('*').eq('id_karyawan', idKaryawan).maybeSingle();

    if (karyData) {
      if (karyData.status === 'nonaktif') {
        return { ok: false, msg: 'ID karyawan ini sudah dinonaktifkan. Hubungi admin.' };
      }

      const { data: assignData } = await db.from('assign_lokasi').select('*').eq('id_karyawan', idKaryawan).maybeSingle();
      if (assignData) {
        const { data: lokData } = await db.from('lokasi').select('*').eq('id', assignData.id_lokasi).maybeSingle();
        if (lokData?.lat && lokData?.lng) {
          return { ok: true, lat: lokData.lat, lng: lokData.lng, radius: lokData.radius || 100, namaLokasi: lokData.nama };
        }
      }
    }
  } catch { /* fallback below */ }

  // Fallback ke localStorage (dari admin.html)
  try {
    const karyawan = JSON.parse(localStorage.getItem('karyawan') || '[]');
    const k = karyawan.find(x => x.id_karyawan === idKaryawan);
    if (k?.status === 'nonaktif') return { ok: false, msg: 'ID karyawan ini sudah dinonaktifkan. Hubungi admin.' };

    const assign = JSON.parse(localStorage.getItem('assign') || '[]');
    const a = assign.find(x => x.id_karyawan === idKaryawan);
    if (a) {
      const lokasi = JSON.parse(localStorage.getItem('lokasi') || '[]');
      const l = lokasi.find(x => x.id === a.id_lokasi);
      if (l?.lat && l?.lng) return { ok: true, lat: l.lat, lng: l.lng, radius: l.radius || 100, namaLokasi: l.nama };
    }
  } catch { /* ignore */ }

  return { ok: true, lat: KANTOR_LAT, lng: KANTOR_LNG, radius: RADIUS_METER, namaLokasi: 'Kantor' };
}

// =============================================
// SUBMIT ABSENSI
// =============================================
async function submitAbsen() {
  const select      = document.getElementById('input-nama');
  const nama        = select.options[select.selectedIndex]?.text || '';
  const idKaryawan  = document.getElementById('input-id').value.trim();

  if (!nama)        { toast('Masukkan nama lengkap dulu!', 'error'); return; }
  if (!idKaryawan)  { toast('Masukkan ID karyawan!', 'error');       return; }
  if (!fotoDataURL) { toast('Ambil foto selfie dulu!', 'error');     return; }
  if (!gpsData)     { toast('Deteksi lokasi GPS dulu!', 'error');    return; }
  if (Date.now() - gpsData.time > 60000) { toast('GPS sudah kadaluarsa, deteksi ulang', 'warn'); return; }
  if (!lokasiKerja) { toast('Pilih lokasi kerja', 'warn');           return; }

  if (Math.abs(gpsData.lat) > 90 || Math.abs(gpsData.lng) > 180 || (gpsData.lat === 0 && gpsData.lng === 0)) {
    toast('Koordinat GPS tidak valid, coba lagi', 'error');
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled    = true;
  btn.textContent = '⏳ Memverifikasi ID...';

  const cek = await cekKaryawanDanLokasi(idKaryawan);
  if (!cek.ok) {
    toast(cek.msg, 'error');
    btn.disabled = false; btn.textContent = 'Kirim Absensi';
    return;
  }

  // Sinkronisasi lokasi kerja dari hasil verifikasi
  lokasiKerja = { lat: cek.lat, lng: cek.lng, radius: cek.radius, nama: cek.namaLokasi };

  if (!allLokasi.length) {
    toast('Data lokasi belum siap, tunggu sebentar...', 'warn');
    btn.disabled = false; btn.textContent = 'Kirim Absensi';
    return;
  }

  if (gpsData.acc > 100) toast('Akurasi GPS terlalu rendah, coba di luar ruangan', 'warn');

  btn.textContent = '⏳ Menyimpan...';

  const hasilEval   = await evaluasiAbsensi(idKaryawan, tipeAbsen);
  const hasil       = getLokasiTerdekat(gpsData.lat, gpsData.lng, allLokasi);
  const jarak       = Math.round(hitungJarak(gpsData.lat, gpsData.lng, lokasiKerja.lat, lokasiKerja.lng));
  const diKantor    = jarak <= lokasiKerja.radius;
  const now         = new Date();

  if (!diKantor) toast('Anda berada di luar area kantor (tetap diizinkan)', 'warn');

  try {
    const { error } = await db.from('absensi').insert([{
      nama,
      id_karyawan:   idKaryawan,
      tipe:          tipeAbsen,
      jam:           now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
      tanggal:       now.toISOString().split('T')[0],
      timestamp:     now.toISOString(),
      latitude:      gpsData.lat,
      longitude:     gpsData.lng,
      akurasi_gps:   gpsData.acc,
      lokasi_nama:   hasil.lokasi?.nama || lokasiKerja?.nama || 'Unknown',
      lokasi_id:     hasil.lokasi?.id   || null,
      jarak_kantor:  hasil.jarak        || jarak,
      di_area_kantor: hasil.dalamRadius ?? diKantor,
      metode:        'mobile',
      telat_menit:   hasilEval?.telat    || 0,
      lembur_menit:  hasilEval?.lembur   || 0,
      is_libur:      hasilEval?.is_libur || false,
    }]);

    if (error) {
      if (error.message.includes('duplicate key')) {
        toast(`Sudah absen ${tipeAbsen} hari ini`, 'warn');
      } else {
        toast('Gagal menyimpan data', 'error');
      }
      btn.disabled = false; btn.textContent = 'Kirim Absensi';
      return;
    }

    // Tampilkan sukses
    document.getElementById('form-screen').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
    document.getElementById('detail-box').innerHTML = `
      <div class="detail-row"><span class="detail-key">Nama</span><span class="detail-val">${nama}</span></div>
      <div class="detail-row"><span class="detail-key">ID</span><span class="detail-val">${idKaryawan}</span></div>
      <div class="detail-row"><span class="detail-key">Tipe</span><span class="detail-val">${tipeAbsen === 'masuk' ? '🟢 Masuk' : '🔴 Pulang'}</span></div>
      <div class="detail-row"><span class="detail-key">Jam</span><span class="detail-val">${now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</span></div>
      <div class="detail-row"><span class="detail-key">Tanggal</span><span class="detail-val">${now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</span></div>
      <div class="detail-row"><span class="detail-key">Lokasi</span><span class="detail-val">${diKantor ? '✅ ' + cek.namaLokasi : '⚠️ Luar area'} (${jarak}m)</span></div>
    `;

  } catch (err) {
    console.error(err);
    toast('Gagal menyimpan. Cek koneksi internet atau konfigurasi Supabase.', 'error');
    btn.disabled = false; btn.textContent = 'Kirim Absensi';
  }
}

// =============================================
// RESET FORM
// =============================================
function absenLagi() {
  document.getElementById('form-screen').style.display = 'block';
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('input-nama').value  = '';
  document.getElementById('input-id').value    = '';
  document.getElementById('input-lokasi').innerHTML = '<option value="">-- Pilih Lokasi --</option>';

  fotoDataURL = null;
  gpsData     = null;
  lokasiKerja = null;

  document.getElementById('foto-preview').style.display    = 'none';
  document.getElementById('retake-btn').style.display      = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('cam-gradient').classList.remove('show');
  document.getElementById('camera-wrap').classList.remove('active');
  document.getElementById('gps-dot').className             = 'gps-dot';
  document.getElementById('gps-text').textContent          = 'Belum terdeteksi';
  document.getElementById('gps-coords').style.display      = 'none';
  document.getElementById('radius-badge').className        = 'radius-badge';

  const btn = document.getElementById('btn-submit');
  btn.disabled    = false;
  btn.textContent = 'Kirim Absensi';
}

// =============================================
// TOAST
// =============================================
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast ' + type;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}
