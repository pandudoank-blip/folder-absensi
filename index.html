<script>
// =============================================
// KONFIGURASI
// =============================================
const SUPABASE_URL = "https://szjlxhfawjopjyfacwxe.supabase.co";
const SUPABASE_KEY = "ISI_ANON_KEY_KAMU";

// OPTIONAL (biar gak error walau gak dipakai)
const CLOUDINARY_CLOUD_NAME = null;
const CLOUDINARY_UPLOAD_PRESET = null;

// INIT DB
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// =============================================
// STATE
// =============================================
let tipeAbsen = 'masuk';
let fotoDataURL = null;
let gpsData = null;

// =============================================
// SUBMIT ABSEN (FIXED)
// =============================================
async function submitAbsen() {
  const nama = document.getElementById('input-nama').value.trim();
  const idKary = document.getElementById('input-id').value.trim();

  if (!nama) return toast('Masukkan nama!', 'error');
  if (!idKary) return toast('Masukkan ID!', 'error');
  if (!fotoDataURL) return toast('Ambil foto dulu!', 'error');
  if (!gpsData) return toast('Ambil GPS dulu!', 'error');

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Menyimpan...';

  try {
    const now = new Date();

    const dataInsert = {
      nama: nama,
      id_karyawan: idKary,
      tipe: tipeAbsen,
      jam: now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }),
      tanggal: now.toISOString().split('T')[0],
      timestamp: now.toISOString(),
      latitude: gpsData.lat,
      longitude: gpsData.lng,
      akurasi_gps: gpsData.acc,
      jarak_kantor: 0,
      di_area_kantor: true,
      foto_url: null, // FIX: selalu ada
      metode: 'mobile'
    };

    const { error } = await db.from('absensi').insert([dataInsert]);

    if (error) throw error;

    toast('Berhasil absen!', 'success');

    // Reset
    btn.disabled = false;
    btn.textContent = 'Kirim Absensi';

  } catch (err) {
    console.error(err);
    toast('Gagal simpan: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Kirim Absensi';
  }
}

// =============================================
// GPS SIMPLE
// =============================================
function deteksiGPS() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      gpsData = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        acc: pos.coords.accuracy
      };
      toast('GPS OK', 'success');
    },
    () => {
      toast('GPS gagal', 'error');
    }
  );
}

// =============================================
// TOAST
// =============================================
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
